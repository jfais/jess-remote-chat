<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jess Remote Chat</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app" id="app">
    <header class="header">
      <div class="header-left">
        <div class="status-indicator" id="statusIndicator"></div>
        <h1 class="header-title">Jess Remote Chat</h1>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="clearBtn" title="Clear Chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
        </button>
        <button class="btn-icon" id="themeToggle" title="Toggle Theme">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="chat-container" id="chatContainer">
      <div class="messages" id="messages"></div>
      <div class="typing-indicator" id="typingIndicator">
        <span>Jess is thinking</span>
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
      </div>
      <button class="scroll-bottom" id="scrollBottom" title="Scroll to bottom">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
        </svg>
      </button>
    </main>

    <footer class="input-area">
      <div class="attachment-preview" id="attachmentPreview"></div>
      <div class="input-row">
        <label class="btn-icon attach-btn" title="Attach Image/PDF">
          <input type="file" id="fileInput" accept="image/*,.pdf" hidden>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
          </svg>
        </label>
        <textarea 
          id="messageInput" 
          placeholder="Type a message..." 
          rows="1"
          maxlength="5000"
        ></textarea>
        <div class="char-count" id="charCount">0/5000</div>
        <button class="btn-send" id="sendBtn" title="Send (Enter)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
      <div class="keyboard-hint">
        <kbd>Enter</kbd> send · <kbd>Shift+Enter</kbd> newline
      </div>
    </footer>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
