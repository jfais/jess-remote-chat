<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Jess Remote Chat</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .settings-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 24px;
    }
    .settings-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .back-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: var(--bg-tertiary);
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: var(--border-color);
      color: var(--text-primary);
    }
    .settings-title {
      font-size: 24px;
      font-weight: 600;
    }
    .settings-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }
    .cli-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .cli-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg-primary);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cli-option:hover {
      border-color: var(--accent-color);
    }
    .cli-option.selected {
      border-color: var(--accent-color);
      background: var(--bg-tertiary);
    }
    .cli-option input {
      display: none;
    }
    .radio-circle {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .cli-option.selected .radio-circle {
      border-color: var(--accent-color);
    }
    .radio-circle::after {
      content: '';
      width: 10px;
      height: 10px;
      background: var(--accent-color);
      border-radius: 50%;
      display: none;
    }
    .cli-option.selected .radio-circle::after {
      display: block;
    }
    .cli-info {
      flex: 1;
    }
    .cli-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .cli-desc {
      font-size: 13px;
      color: var(--text-muted);
    }
    .cli-badge {
      font-size: 11px;
      padding: 4px 8px;
      background: var(--accent-color);
      color: white;
      border-radius: 6px;
      font-weight: 500;
    }
    .input-group {
      margin-bottom: 16px;
    }
    .input-group:last-child {
      margin-bottom: 0;
    }
    .input-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .input-field {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-primary);
      transition: border-color 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--accent-color);
    }
    .input-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .save-btn {
      width: 100%;
      padding: 14px 24px;
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .save-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
    .save-btn:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }
    .status-msg {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .status-msg.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
    }
    .status-msg.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }
    .current-cli {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg-primary);
      border-radius: 10px;
      margin-top: 16px;
    }
    .current-cli-label {
      font-size: 13px;
      color: var(--text-muted);
    }
    .current-cli-value {
      font-weight: 600;
      color: var(--accent-color);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <a href="/" class="back-btn" title="Back to Chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </a>
        <h1 class="header-title">Settings</h1>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="themeToggle" title="Toggle Theme">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="settings-container">
      <div class="status-msg" id="statusMsg"></div>

      <div class="settings-section">
        <h2 class="section-title">AI CLI Tool</h2>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px;">
          Select which AI CLI tool to use for processing messages
        </p>
        
        <div class="cli-options">
          <label class="cli-option" data-cli="kilo">
            <input type="radio" name="cli" value="kilo">
            <span class="radio-circle"></span>
            <div class="cli-info">
              <div class="cli-name">Kilo CLI</div>
              <div class="cli-desc">Jess AI Companion - Personal assistant with MemoryCore</div>
            </div>
          </label>
          
          <label class="cli-option" data-cli="claude">
            <input type="radio" name="cli" value="claude">
            <span class="radio-circle"></span>
            <div class="cli-info">
              <div class="cli-name">Claude Code</div>
              <div class="cli-desc">Anthropic's CLI tool for AI-assisted coding</div>
            </div>
          </label>
          
          <label class="cli-option" data-cli="opencode">
            <input type="radio" name="cli" value="opencode">
            <span class="radio-circle"></span>
            <div class="cli-info">
              <div class="cli-name">OpenCode</div>
              <div class="cli-desc">Open source AI coding assistant</div>
            </div>
          </label>
        </div>

        <div class="current-cli">
          <span class="current-cli-label">Current:</span>
          <span class="current-cli-value" id="currentCli">Loading...</span>
        </div>
      </div>

      <div class="settings-section">
        <h2 class="section-title">Configuration</h2>
        
        <div class="input-group">
          <label class="input-label" for="memoryPath">MemoryCore Path</label>
          <input type="text" id="memoryPath" class="input-field" placeholder="/home/spsadmin/www/MemoryCore">
          <p class="input-hint">Path to MemoryCore directory for AI context</p>
        </div>

        <div class="input-group">
          <label class="input-label" for="pollInterval">Poll Interval (ms)</label>
          <input type="number" id="pollInterval" class="input-field" placeholder="2000" min="500" max="10000">
          <p class="input-hint">How often the worker checks for new messages (500-10000ms)</p>
        </div>
      </div>

      <button class="save-btn" id="saveBtn">Save Settings</button>
    </main>
  </div>
  <script src="/js/settings.js"></script>
</body>
</html>
